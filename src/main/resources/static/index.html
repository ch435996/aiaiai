<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIAIAI — 点云补全智能科研助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #080c12;
  --bg-surface: #111720;
  --bg-elevated: #181f2a;
  --border: #1e2a36;
  --border-active: #2a3a4a;
  --text-primary: #e2e8f0;
  --text-secondary: #8899aa;
  --text-muted: #556677;
  --accent: #00d4f0;
  --accent-glow: rgba(0, 212, 240, 0.12);
  --amber: #f0a030;
  --green: #2ecc71;
  --red: #e74c3c;
  --radius: 6px;
  --radius-lg: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

canvas#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.35;
}

/* ── Sidebar ── */
aside {
  width: 280px;
  min-width: 280px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 1;
  gap: 16px;
  padding: 20px 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 4px;
}
.brand .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.brand h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-primary);
}
.brand span { color: var(--accent); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
}
.btn-new {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid rgba(0,212,240,0.2);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new:hover { background: var(--accent); color: var(--bg-deep); }

.session-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.session-list::-webkit-scrollbar { width: 3px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.session-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  position: relative;
}
.session-item:hover { background: var(--bg-elevated); }
.session-item.active {
  background: var(--bg-elevated);
  border-color: var(--border-active);
}
.session-item .sess-preview {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-item.active .sess-preview { color: var(--text-primary); }
.session-item .sess-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}
.session-item .btn-delete {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.15s;
}
.session-item:hover .btn-delete { opacity: 1; }
.session-item .btn-delete:hover { color: var(--red); }

.empty-sessions {
  color: var(--text-muted);
  font-size: 11px;
  text-align: center;
  padding: 24px 8px;
  line-height: 1.6;
}

/* ── Main ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  z-index: 1;
  min-width: 0;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.welcome {
  text-align: center;
  padding: 60px 20px 40px;
  animation: fadeIn 0.6s ease;
}
.welcome .hex {
  width: 48px; height: 48px;
  margin: 0 auto 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.welcome h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
.welcome p { font-size: 13px; color: var(--text-secondary); max-width: 440px; margin: 0 auto; line-height: 1.6; }

.message {
  max-width: 720px;
  animation: msgIn 0.25s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.message.user { align-self: flex-end; }
.message.user .bubble {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 2px var(--radius-lg);
}
.message.assistant { align-self: flex-start; }
.message.assistant .bubble {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 2px;
}

.bubble {
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
}
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { color: var(--accent); font-weight: 600; }
.bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--bg-deep);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--amber);
}
.bubble pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
  line-height: 1.5;
}

.msg-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
  padding: 0 2px;
}
.message.user .msg-label { text-align: right; }

/* ── Status line for tool calls ── */
.status-line {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px 0;
  animation: fadeIn 0.3s ease;
}
.status-line .dot-indicator { width: 6px; height: 6px; border-radius: 50%; }
.status-line.working .dot-indicator { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s ease-in-out infinite; }
.status-line.done .dot-indicator { background: var(--green); }

/* ── Input ── */
.input-bar {
  border-top: 1px solid var(--border);
  padding: 16px 32px 20px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
  background: var(--bg-surface);
}
.input-bar textarea {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  resize: none;
  outline: none;
  line-height: 1.5;
  min-height: 44px;
  max-height: 160px;
  transition: border-color 0.2s;
}
.input-bar textarea:focus { border-color: var(--border-active); }
.input-bar textarea::placeholder { color: var(--text-muted); }

.btn-send {
  width: 44px; height: 44px;
  border: 1px solid var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent); color: var(--bg-deep); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-send svg { width: 18px; height: 18px; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 5px; height: 5px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.error-banner {
  background: rgba(231, 76, 60, 0.08);
  border: 1px solid rgba(231, 76, 60, 0.2);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--red);
  animation: fadeIn 0.3s ease;
}

/* ── Tool Activity 可展开卡片 ── */
.status-line {
  cursor: default;
  user-select: none;
}
.status-line.expandable {
  cursor: pointer;
}
.status-line .arrow {
  font-size: 10px;
  margin-left: 4px;
  transition: transform 0.2s;
  display: inline-block;
}
.status-line.expanded .arrow {
  transform: rotate(180deg);
}

.tool-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 4px 0 8px 18px;
  padding: 12px 14px;
  animation: fadeIn 0.25s ease;
  max-width: 660px;
}
.snippet-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.snippet-row:last-child {
  border-bottom: none;
}
.snippet-row .snippet-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.conf-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.conf-dot.high { background: var(--green); box-shadow: 0 0 4px var(--green); }
.conf-dot.medium { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.conf-dot.low { background: var(--red); box-shadow: 0 0 4px var(--red); }

.conf-label {
  font-weight: 600;
}
.conf-label.high { color: var(--green); }
.conf-label.medium { color: var(--amber); }
.conf-label.low { color: var(--red); }

.snippet-source {
  color: var(--accent);
  font-size: 11px;
}
.snippet-preview {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  padding-left: 16px;
}

@media (max-width: 720px) {
  aside { display: none; }
  .chat-area { padding: 16px; }
  .input-bar { padding: 12px 16px 16px; }
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<aside>
  <div class="brand">
    <div class="dot"></div>
    <h1>AIA<span>IAI</span></h1>
  </div>
  <div class="section-header">
    <span class="section-label">会话历史</span>
    <button class="btn-new" id="btnNew" title="新建会话">+ New</button>
  </div>
  <div class="session-list" id="sessionList">
    <div class="empty-sessions">尚无历史会话<br>发送消息后将自动保存</div>
  </div>
</aside>

<main>
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="hex">&#9670;</div>
      <h2>点云补全智能科研助手</h2>
      <p>支持论文检索、方法对比与实验排障。<br>询问 SnowflakeNet、PCN、FoldingNet 等方法的论文细节与实验配置。</p>
    </div>
  </div>
  <div class="input-bar">
    <textarea id="msgInput" placeholder="输入问题…" rows="1" autofocus></textarea>
    <button class="btn-send" id="btnSend" title="发送 (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9 22 2z"/>
      </svg>
    </button>
  </div>
</main>

<script>
const API_SESSIONS = '/api/sessions';
const LS_KEY = 'aiaiai_session_id';

const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const btnSend = document.getElementById('btnSend');
const btnNew = document.getElementById('btnNew');
const sessionList = document.getElementById('sessionList');
const welcome = document.getElementById('welcome');

let sessionId = localStorage.getItem(LS_KEY) || null;
let loading = false;

/* ── Particle bg ── */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
function initParticles() {
  const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 12000));
  particles = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    opacity: Math.random() * 0.5 + 0.2
  }));
}
initParticles();
function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,240,${p.opacity})`; ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ── Session management ── */
async function loadSessions() {
  try {
    const res = await fetch(API_SESSIONS);
    if (!res.ok) return;
    const sessions = await res.json();
    renderSessionList(sessions);
  } catch (_) {}
}

function renderSessionList(sessions) {
  sessionList.innerHTML = '';
  if (sessions.length === 0) {
    sessionList.innerHTML = '<div class="empty-sessions">尚无历史会话<br>发送消息后将自动保存</div>';
    return;
  }
  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.sessionId === sessionId ? ' active' : '');
    const time = new Date(s.createdAt).toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    el.innerHTML = `
      <div class="sess-preview">${escHtml(s.preview || '(空会话)')}</div>
      <div class="sess-time">${time} · ${s.messageCount || 0} 条</div>
      <button class="btn-delete" data-sid="${s.sessionId}" title="删除">×</button>
    `;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-delete')) return;
      switchSession(s.sessionId);
    });
    sessionList.appendChild(el);
  }
  // bind delete buttons
  for (const btn of sessionList.querySelectorAll('.btn-delete')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const sid = btn.dataset.sid;
      await fetch(API_SESSIONS + '/' + sid, { method: 'DELETE' });
      if (sessionId === sid) { newSession(); }
      loadSessions();
    });
  }
}

function switchSession(sid) {
  sessionId = sid;
  localStorage.setItem(LS_KEY, sid);
  loadSessions();
  loadSessionMessages();
}

function newSession() {
  sessionId = null;
  localStorage.removeItem(LS_KEY);
  loadSessions();
  loadSessionMessages();
}

btnNew.addEventListener('click', newSession);

async function loadSessionMessages() {
  chatArea.innerHTML = "";
  if (!sessionId) {
    const w = document.getElementById("welcome");
    if (w) { chatArea.appendChild(w); w.style.display = ""; }
    return;
  }
  try {
    const res = await fetch(API_SESSIONS + "/" + sessionId + "/messages");
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    const messages = await res.json();
    if (messages.length === 0) {
      chatArea.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px;">空会话</div>';
      return;
    }
    for (const msg of messages) {
      if (msg.role === "system") continue;
      if (msg.role === "tool") {
        const snippets = parseToolSnippets(msg.content);
        if (snippets.length > 0) {
          const label = msg.content.includes('[知识库检索结果]')
            ? '检索到 ' + snippets.length + ' 条结果'
            : msg.content.includes('[长期记忆召回]')
              ? '召回 ' + snippets.length + ' 条记忆'
              : null;
          if (label) {
            addStatusLine(label, 'done', { snippets });
          }
        } else if (msg.content.includes('未在知识库中找到')) {
          addStatusLine('检索完毕：未找到相关内容', 'done');
        } else if (msg.content.includes('未找到相关记忆')) {
          addStatusLine('召回完毕：未找到相关记忆', 'done');
        } else if (msg.content.includes('已保存到长期记忆')) {
          addStatusLine('已保存到长期记忆', 'done');
        }
        continue;
      }
      addMessage(msg.role, msg.content);
    }
    scrollDown();
  } catch (err) {
    chatArea.innerHTML = '<div class="error-banner">加载历史失败: ' + escHtml(err.message) + '</div>';
  }
}

/* ── Chat ── */
function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatReply(text) {
  let html = escHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  const lines = html.split('\n');
  let out = '', inPre = false;
  for (const line of lines) {
    if (line.startsWith('<pre>')) { inPre = true; out += line; continue; }
    if (line.startsWith('</pre>')) { inPre = false; out += line; continue; }
    if (inPre) { out += line + '\n'; continue; }
    if (line.trim() === '') { out += '<br>'; continue; }
    out += '<p>' + line + '</p>';
  }
  return out;
}

function addStatusLine(text, type, opts = {}, beforeEl = null) {
  const el = document.createElement('div');
  const hasSnippets = opts.snippets && opts.snippets.length > 0;
  el.className = 'status-line ' + type + (hasSnippets ? ' expandable' : '');
  el.innerHTML = '<span class="dot-indicator"></span>' + text
    + (hasSnippets ? '<span class="arrow">▼</span>' : '');
  if (hasSnippets) {
    el._snippets = opts.snippets;
    el._expanded = false;
    el.addEventListener('click', () => {
      el._expanded = !el._expanded;
      if (el._expanded) {
        el.classList.add('expanded');
        const card = renderToolCard(el._snippets);
        el.after(card);
      } else {
        el.classList.remove('expanded');
        const next = el.nextElementSibling;
        if (next && next.classList.contains('tool-card')) next.remove();
      }
    });
  }
  if (beforeEl) {
    chatArea.insertBefore(el, beforeEl);
  } else {
    chatArea.appendChild(el);
  }
  scrollDown();
}

function removeStatusLines() {
  chatArea.querySelectorAll('.status-line').forEach(el => el.remove());
  chatArea.querySelectorAll('.tool-card').forEach(el => el.remove());
}

function renderToolCard(snippets) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  let html = '';
  for (const s of snippets) {
    const cls = s.confidence ? s.confidence.toLowerCase() : 'low';
    html += '<div class="snippet-row">'
      + '<div class="snippet-header">'
      + '<span class="conf-dot ' + cls + '"></span>'
      + '<span class="conf-label ' + cls + '">' + (s.confidence || 'LOW') + '</span>'
      + '<span style="color:var(--text-muted);font-size:10px">score ' + (Math.round(s.score * 100)) + '%</span>'
      + (s.source ? '<span class="snippet-source">' + escHtml(s.source) + '</span>' : '')
      + '</div>'
      + '<div class="snippet-preview">' + escHtml(s.preview || '') + '</div>'
      + '</div>';
  }
  card.innerHTML = html;
  return card;
}

function addMessage(role, text) {
  const w = document.getElementById("welcome");
  if (w) w.style.display = "none";
  const el = document.createElement('div');
  el.className = 'message ' + role;
  el.innerHTML = `<div class="msg-label">${role === 'user' ? 'YOU' : 'AIAIAI'}</div><div class="bubble">${formatReply(text)}</div>`;
  chatArea.appendChild(el);
  scrollDown();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.id = 'typingMsg';
  el.innerHTML = '<div class="msg-label">AIAIAI</div><div class="typing-indicator"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  scrollDown();
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function addError(text) {
  const el = document.createElement('div');
  el.className = 'error-banner';
  el.textContent = 'Error: ' + text;
  chatArea.appendChild(el);
  scrollDown();
}

function createStreamBubble() {
  const w = document.getElementById("welcome");
  if (w) w.style.display = "none";
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.id = 'streamMsg';
  el.innerHTML = '<div class="msg-label">AIAIAI</div><div class="bubble" id="streamBubble"></div>';
  chatArea.appendChild(el);
  return el;
}

function updateStreamBubble(el, text) {
  el.querySelector('.bubble').innerHTML = formatReply(text);
  scrollDown();
}

function scrollDown() { chatArea.scrollTop = chatArea.scrollHeight; }

function setLoading(v) {
  loading = v;
  btnSend.disabled = v;
  msgInput.disabled = v;
  if (v) {
    btnSend.innerHTML = '<div class="spinner"></div>';
  } else {
    btnSend.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9 22 2z"/></svg>`;
    msgInput.focus();
  }
}

function detectToolActivity(reply) {
  const tags = [];
  if (reply.includes('[知识库检索结果]') || reply.includes('[检索结果]')) tags.push('search');
  if (reply.includes('[长期记忆召回]') || reply.includes('已保存到长期记忆') || reply.includes('[长期记忆上下文]')) tags.push('memory');
  return tags;
}

/** 从工具返回文本中解析结构化片段（前端版 extractSnippets） */
function parseToolSnippets(resultText) {
  if (!resultText || resultText.includes('未在知识库中找到') && resultText.includes('未找到相关记忆')) return [];
  const snippets = [];
  const re = /--- (?:结果|记忆) \d+ \(相关度: ([\d.]+)\) ---\n([\s\S]*?)(?=\n--- (?:结果|记忆) \d+ |\n?$)/g;
  let m;
  while ((m = re.exec(resultText)) !== null && snippets.length < 2) {
    const score = parseFloat(m[1]);
    const fullText = m[2].trim();
    const preview = fullText.length > 120 ? fullText.substring(0, 120) + '…' : fullText;
    const confidence = score >= 0.85 ? 'HIGH' : score >= 0.70 ? 'MEDIUM' : 'LOW';
    snippets.push({ score, confidence, preview, source: '知识库' });
  }
  return snippets;
}

async function sendMessage() {
  const message = msgInput.value.trim();
  if (!message || loading) return;

  addMessage('user', message);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  setLoading(true);
  addStatusLine('正在处理…', 'working initial');
  addTyping();

  let streamEl = null;
  let streamText = '';
  let hasStreamContent = false;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: sessionId, message: message })
    });
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const events = buffer.split('\n\n');
      buffer = events.pop();

      for (const raw of events) {
        const lines = raw.split('\n');
        const evType = lines.find(l => l.startsWith('event:'))?.slice(6).trim();
        const dataLn = lines.find(l => l.startsWith('data:'));
        if (!dataLn) continue;
        let data;
        try { data = JSON.parse(dataLn.slice(5).trim()); } catch (_) { continue; }

        switch (evType) {
          case 'connected':
            // SSE 通道已建立
            break;
          case 'token':
            removeTyping();
            // 只移除初始"正在处理…"行，保留 tool 状态行
            chatArea.querySelectorAll('.status-line.initial').forEach(el => el.remove());
            if (!streamEl) {
              streamEl = createStreamBubble();
              hasStreamContent = true;
            }
            streamText += data.content;
            updateStreamBubble(streamEl, streamText);
            break;
          case 'tool_call':
            removeStatusLines();
            addStatusLine(
              data.inputPreview
                ? data.summary + ': "' + data.inputPreview + '"…'
                : data.summary + '…',
              'working');
            break;
          case 'tool_result':
            removeStatusLines();
            addStatusLine(
              data.resultSummary || data.summary,
              'done',
              { snippets: data.snippets });
            break;
          case 'done':
            removeStatusLines();
            if (!hasStreamContent) removeTyping();
            if (data.sessionId && !sessionId) {
              sessionId = data.sessionId;
              localStorage.setItem(LS_KEY, sessionId);
            }
            if (data.toolCalls && data.toolCalls.length > 0) {
              for (const tc of data.toolCalls) {
                if (tc.status === 'request') continue; // 跳过 request，只展示 result
                addStatusLine(
                  tc.resultSummary || tc.summary,
                  'done',
                  { snippets: tc.snippets },
                  streamEl  // 插入到 AI 回复之前
                );
              }
            }
            break;
          case 'error':
            removeTyping();
            removeStatusLines();
            addError(data.message);
            break;
        }
      }
    }
    // 流正常结束后清理（tool 状态行保留不删）
    removeTyping();
    loadSessions();
  } catch (err) {
    removeTyping();
    removeStatusLines();
    addError(err.message);
  } finally {
    setLoading(false);
  }
}

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
});
btnSend.addEventListener('click', sendMessage);

// Init
loadSessions();
if (sessionId) {
  loadSessionMessages();
}
</script>
