spring:
  application:
    name: aiaiai-phase2
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5s

aiaiai:
  llm:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model-name: ${DEEPSEEK_MODEL:deepseek-chat}
    temperature: 0.7
    max-tokens: 4096
    timeout-seconds: 120
    log-requests: true
    log-responses: true

  embedding:
    base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${EMBEDDING_API_KEY:}
    model-name: ${EMBEDDING_MODEL:text-embedding-v3}
    dimensions: 1024

  embedding-v2:
    base-url: ${EMBEDDING_V2_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${EMBEDDING_V2_API_KEY:${EMBEDDING_API_KEY:}}
    model-name: ${EMBEDDING_V2_MODEL:text-embedding-v4}
    dimensions: ${EMBEDDING_V2_DIMENSIONS:1024}

  pinecone:
    api-key: ${PINECONE_API_KEY:}
    index: ${PINECONE_INDEX:aiaiai-knowledge}
    namespace-knowledge: knowledge
    namespace-memory: memory
    namespace-knowledge-v2: knowledge_v2
    cloud: AWS
    region: us-east-1
    dimension: ${PINECONE_DIMENSION:1024}
  memory:
    short-term:
      max-messages: 20
      ttl-days: 7
    long-term:
      min-score: 0.75

  ingestion:
    max-segment-size: 1000
    max-overlap-size: 80
    pdf-directory: ${PDF_DIRECTORY:./papers}

  ingestion-v2:
    max-segment-size: ${INGESTION_V2_SEGMENT_SIZE:1000}
    max-overlap-size: ${INGESTION_V2_OVERLAP_SIZE:80}

  retrieval:
    top-k: 5
    min-score: 0.0
    embedding-version: ${RETRIEVAL_EMBEDDING_VERSION:v2}
    min-score-java: ${RETRIEVAL_MIN_SCORE:0.70}
    high-confidence: ${RETRIEVAL_HIGH_CONFIDENCE:0.85}
    min-score-java-v2: ${RETRIEVAL_MIN_SCORE_V2:0.70}
    high-confidence-v2: ${RETRIEVAL_HIGH_CONFIDENCE_V2:0.85}

logging:
  level:
    com.aiaiai: DEBUG
    dev.langchain4j: DEBUG
